name: Cypress Tests

on: push

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install
        working-directory: Odev 1

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: Odev .